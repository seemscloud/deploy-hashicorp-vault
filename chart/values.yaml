# Values for the official hashicorp/vault Helm chart.
# Prepared from chart version 0.34.0 pulled from:
# https://helm.releases.hashicorp.com

global:
  enabled: true
  namespace: vault
  tlsDisable: true

injector:
  enabled: true
  replicas: 1
  affinity: ""

  resources:
    requests:
      cpu: 50m
      memory: 128Mi

  podDisruptionBudget:
    maxUnavailable: 1

server:
  enabled: true
  updateStrategyType: OnDelete
  logLevel: info
  logFormat: json
  affinity: ""

  resources:
    requests:
      cpu: 50m
      memory: 128Mi

  ingress:
    enabled: true
    annotations:
      cert-manager.io/cluster-issuer: cloudflare
      external-dns.alpha.kubernetes.io/hostname: vault.psem.io
      external-dns.alpha.kubernetes.io/ttl: "60"
      nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    ingressClassName: nginx-internal
    pathType: Prefix
    activeService: true
    hosts:
      - host: vault.psem.io
        paths:
          - /
    tls:
      - secretName: vault-ingress-tls
        hosts:
          - vault.psem.io

  service:
    enabled: true
    type: ClusterIP
    active:
      enabled: true
    standby:
      enabled: true

  dataStorage:
    enabled: true
    size: 20Gi
    storageClass: standard-rwo
    accessMode: ReadWriteOnce

  auditStorage:
    enabled: true
    size: 10Gi
    storageClass: standard-rwo
    accessMode: ReadWriteOnce

  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain

  standalone:
    enabled: false

  ha:
    enabled: true
    replicas: 3

    raft:
      enabled: true
      setNodeId: true
      config: |
        ui = true

        listener "tcp" {
          tls_disable = 1
          address = "[::]:8200"
          cluster_address = "[::]:8201"

          telemetry {
            unauthenticated_metrics_access = "true"
          }
        }

        storage "raft" {
          path = "/vault/data"
        }

        service_registration "kubernetes" {}

        telemetry {
          prometheus_retention_time = "30s"
          disable_hostname = true
        }

    disruptionBudget:
      enabled: true
      maxUnavailable: 1

  serviceAccount:
    create: true
    createSecret: false
    serviceDiscovery:
      enabled: true

ui:
  enabled: true
  serviceType: ClusterIP
  externalPort: 8200
  targetPort: 8200

csi:
  enabled: false
