example_secrets:
  kv/lpp/gcp/services/service-aaa:
    paths:
      - path: prod/db
        data:
          username: service_aaa_user
          password: dev-service-aaa-password
          note: Dummy prod DB secret for service-aaa.
      - path: test/api
        data:
          api_key: dev-service-aaa-test-api-key
          note: Dummy test API secret for service-aaa.

  kv/lpp/azure/services/service-alpha-worker:
    paths:
      - path: prod/queue
        data:
          queue_token: dev-service-alpha-worker-queue-token
          note: Dummy prod queue secret for service-alpha-worker.

  kv/lpp/gcp/services/service-bbb:
    paths:
      - path: prod/api
        data:
          api_key: dev-service-bbb-api-key
          note: Dummy prod API secret for service-bbb.

  kv/lpp/onprem/services/service-beta-api:
    paths:
      - path: prod/db
        data:
          username: service_beta_api_user
          password: dev-service-beta-api-password
          note: Dummy prod DB secret for service-beta-api.

  kv/lpp/onprem/services/service-shared-api:
    paths:
      - path: prod/token
        data:
          token: dev-service-shared-api-token
          note: Dummy shared service token. Beta writes it, Alpha reads it.

  kv/lpp/gcp/services/service-gamma-api:
    paths:
      - path: prod/db
        data:
          username: service_gamma_api_user
          password: dev-service-gamma-api-password
          note: Dummy prod DB secret for service-gamma-api.

  kv/lpp/azure/services/service-gamma-worker:
    paths:
      - path: prod/cache
        data:
          cache_password: dev-service-gamma-worker-cache-password
          note: Dummy prod cache secret for service-gamma-worker.
