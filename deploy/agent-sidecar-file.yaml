apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-sidecar-file
  namespace: vault
  labels:
    app.kubernetes.io/name: agent-sidecar-file
    app.kubernetes.io/part-of: vault-delivery-patterns
data:
  agent.hcl: |
    vault {
      address = "http://vault.vault.svc:8200"
    }

    auto_auth {
      method "kubernetes" {
        mount_path = "auth/k8s/gke/prod-common-apps/europe-west1/karakoram"
        config = {
          role = "agent-sidecar-file"
        }
      }
    }

    template_config {
      static_secret_render_interval = "1m"
    }

    template {
      destination = "/vault/secrets/config.yaml"
      contents = <<EOH
    {{- with secret "kv/data/lpp/gcp/services/service-aaa/prod/app-config" -}}
    {{ index .Data.data "config.yaml" }}
    {{- end }}
    EOH
    }
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-sidecar-file
  namespace: vault
  labels:
    app.kubernetes.io/name: agent-sidecar-file
    app.kubernetes.io/part-of: vault-delivery-patterns
automountServiceAccountToken: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-sidecar-file
  namespace: vault
  labels:
    app.kubernetes.io/name: agent-sidecar-file
    app.kubernetes.io/part-of: vault-delivery-patterns
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: agent-sidecar-file
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agent-sidecar-file
        app.kubernetes.io/part-of: vault-delivery-patterns
    spec:
      serviceAccountName: agent-sidecar-file
      containers:
        - name: agent
          image: hashicorp/vault:1.21.4
          args: ["agent", "-config=/vault/config/agent.hcl"]
          volumeMounts:
            - name: agent-config
              mountPath: /vault/config
              readOnly: true
            - name: rendered-secrets
              mountPath: /vault/secrets
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
        - name: app
          image: busybox:1.36
          command:
            - /bin/sh
            - -ec
            - |
              until test -s /vault/secrets/config.yaml; do sleep 1; done
              exec tail -f /dev/null
          volumeMounts:
            - name: rendered-secrets
              mountPath: /vault/secrets
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
      volumes:
        - name: agent-config
          configMap:
            name: agent-sidecar-file
        - name: rendered-secrets
          emptyDir:
            medium: Memory
