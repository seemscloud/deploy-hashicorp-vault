apiVersion: v1
kind: ServiceAccount
metadata:
  name: injector-init-env
  namespace: vault
  labels:
    app.kubernetes.io/name: injector-init-env
    app.kubernetes.io/part-of: vault-delivery-patterns
automountServiceAccountToken: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: injector-init-env
  namespace: vault
  labels:
    app.kubernetes.io/name: injector-init-env
    app.kubernetes.io/part-of: vault-delivery-patterns
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: injector-init-env
  template:
    metadata:
      labels:
        app.kubernetes.io/name: injector-init-env
        app.kubernetes.io/part-of: vault-delivery-patterns
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/agent-pre-populate-only: "true"
        vault.hashicorp.com/auth-path: "auth/k8s/gke/prod-common-apps/europe-west1/karakoram"
        vault.hashicorp.com/role: "injector-init-env"
        vault.hashicorp.com/agent-inject-secret-app.env: "kv/data/lpp/gcp/services/service-aaa/prod/app-env"
        vault.hashicorp.com/agent-inject-template-app.env: |
          {{- with secret "kv/data/lpp/gcp/services/service-aaa/prod/app-env" -}}
          {{ index .Data.data "app.env" }}
          {{- end }}
    spec:
      serviceAccountName: injector-init-env
      containers:
        - name: app
          image: busybox:1.36
          command:
            - /bin/sh
            - -ec
            - |
              until test -s /vault/secrets/app.env; do sleep 1; done
              set -a
              . /vault/secrets/app.env
              set +a
              test -n "$APP_NAME"
              exec tail -f /dev/null
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
