apiVersion: v1
kind: ServiceAccount
metadata:
  name: client-cli
  namespace: vault
  labels:
    app.kubernetes.io/name: client-cli
    app.kubernetes.io/part-of: vault-delivery-patterns
automountServiceAccountToken: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: client-cli
  namespace: vault
  labels:
    app.kubernetes.io/name: client-cli
    app.kubernetes.io/part-of: vault-delivery-patterns
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: client-cli
  template:
    metadata:
      labels:
        app.kubernetes.io/name: client-cli
        app.kubernetes.io/part-of: vault-delivery-patterns
    spec:
      serviceAccountName: client-cli
      containers:
        - name: app
          image: hashicorp/vault:1.21.4
          env:
            - name: VAULT_ADDR
              value: http://vault.vault.svc:8200
          command:
            - /bin/sh
            - -ec
            - |
              token="$(vault write -field=token auth/k8s/gke/prod-common-apps/europe-west1/karakoram/login role=client-cli jwt=@/var/run/secrets/kubernetes.io/serviceaccount/token)"
              VAULT_TOKEN="$token" vault kv get -mount=kv -field=config.yaml lpp/gcp/services/service-aaa/prod/app-config > /vault/secrets/config.yaml
              exec tail -f /dev/null
          volumeMounts:
            - name: rendered-secrets
              mountPath: /vault/secrets
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
      volumes:
        - name: rendered-secrets
          emptyDir:
            medium: Memory
