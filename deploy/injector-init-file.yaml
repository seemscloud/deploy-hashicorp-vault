apiVersion: v1
kind: ServiceAccount
metadata:
  name: injector-init-file
  namespace: vault
  labels:
    app.kubernetes.io/name: injector-init-file
    app.kubernetes.io/part-of: vault-demo
automountServiceAccountToken: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: injector-init-file
  namespace: vault
  labels:
    app.kubernetes.io/name: injector-init-file
    app.kubernetes.io/part-of: vault-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: injector-init-file
  template:
    metadata:
      labels:
        app.kubernetes.io/name: injector-init-file
        app.kubernetes.io/part-of: vault-demo
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/agent-pre-populate-only: "true"
        vault.hashicorp.com/auth-path: "auth/k8s/gke/prod-common-apps/europe-west1/karakoram"
        vault.hashicorp.com/role: "injector-init-file"
        vault.hashicorp.com/agent-inject-secret-config.yaml: "kv/data/lpp/gcp/services/service-aaa/prod/app-config"
        vault.hashicorp.com/agent-inject-template-config.yaml: |
          {{- with secret "kv/data/lpp/gcp/services/service-aaa/prod/app-config" -}}
          {{ index .Data.data "config.yaml" }}
          {{- end }}
    spec:
      serviceAccountName: injector-init-file
      containers:
        - name: app
          image: busybox:1.36
          command:
            - /bin/sh
            - -ec
            - |
              test -s /vault/secrets/config.yaml
              exec tail -f /dev/null
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
