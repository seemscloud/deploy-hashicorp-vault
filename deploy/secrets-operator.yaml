# Requires Vault Secrets Operator CRDs and controller. Do not apply until VSO is installed.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: secrets-operator
  namespace: vault
  labels:
    app.kubernetes.io/name: secrets-operator
    app.kubernetes.io/part-of: vault-delivery-patterns
automountServiceAccountToken: true
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultConnection
metadata:
  name: secrets-operator
  namespace: vault
spec:
  address: http://vault.vault.svc:8200
  skipTLSVerify: true
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultAuth
metadata:
  name: secrets-operator
  namespace: vault
spec:
  vaultConnectionRef: secrets-operator
  method: kubernetes
  mount: k8s/gke/prod-common-apps/europe-west1/karakoram
  kubernetes:
    role: secrets-operator
    serviceAccount: secrets-operator
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: secrets-operator-config
  namespace: vault
spec:
  vaultAuthRef: secrets-operator
  mount: kv
  type: kv-v2
  path: lpp/gcp/services/service-aaa/prod/app-config
  refreshAfter: 1m
  destination:
    create: true
    name: secrets-operator-config
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: secrets-operator
  namespace: vault
  labels:
    app.kubernetes.io/name: secrets-operator
    app.kubernetes.io/part-of: vault-delivery-patterns
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: secrets-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: secrets-operator
        app.kubernetes.io/part-of: vault-delivery-patterns
    spec:
      serviceAccountName: secrets-operator
      containers:
        - name: app
          image: busybox:1.36
          command: ["/bin/sh", "-ec", "test -s /mnt/secrets/config.yaml && exec tail -f /dev/null"]
          volumeMounts:
            - name: vault-secrets
              mountPath: /mnt/secrets
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
      volumes:
        - name: vault-secrets
          secret:
            secretName: secrets-operator-config
