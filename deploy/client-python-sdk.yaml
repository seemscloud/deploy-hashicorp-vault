apiVersion: v1
kind: ConfigMap
metadata:
  name: client-python-sdk
  namespace: vault
  labels:
    app.kubernetes.io/name: client-python-sdk
    app.kubernetes.io/part-of: vault-delivery-patterns
data:
  requirements.txt: |
    hvac==2.3.0
  app.py: |
    import logging
    import os
    import time
    from pathlib import Path

    import hvac


    logging.basicConfig(level=logging.INFO, format="%(asctime)s %(levelname)s %(message)s")

    VAULT_ADDR = os.environ["VAULT_ADDR"]
    VAULT_AUTH_MOUNT = "k8s/gke/prod-common-apps/europe-west1/karakoram"
    VAULT_ROLE = "client-python-sdk"
    SECRET_PATH = "lpp/gcp/services/service-aaa/prod/app-config"
    SERVICE_ACCOUNT_TOKEN = "/var/run/secrets/kubernetes.io/serviceaccount/token"


    def login() -> hvac.Client:
        client = hvac.Client(url=VAULT_ADDR)
        jwt = Path(SERVICE_ACCOUNT_TOKEN).read_text(encoding="utf-8")
        client.auth.kubernetes.login(
            role=VAULT_ROLE,
            jwt=jwt,
            mount_point=VAULT_AUTH_MOUNT,
        )
        if not client.is_authenticated():
            raise RuntimeError("Vault Kubernetes authentication failed")
        return client


    client = login()
    secret = client.secrets.kv.v2.read_secret_version(
        mount_point="kv",
        path=SECRET_PATH,
    )
    logging.info("Loaded Vault secret keys: %s", sorted(secret["data"]["data"].keys()))

    while True:
        time.sleep(300)
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: client-python-sdk
  namespace: vault
  labels:
    app.kubernetes.io/name: client-python-sdk
    app.kubernetes.io/part-of: vault-delivery-patterns
automountServiceAccountToken: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: client-python-sdk
  namespace: vault
  labels:
    app.kubernetes.io/name: client-python-sdk
    app.kubernetes.io/part-of: vault-delivery-patterns
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: client-python-sdk
  template:
    metadata:
      labels:
        app.kubernetes.io/name: client-python-sdk
        app.kubernetes.io/part-of: vault-delivery-patterns
    spec:
      serviceAccountName: client-python-sdk
      initContainers:
        - name: install-hvac
          image: python:3.12-slim
          command: ["pip", "install", "--no-cache-dir", "--target=/opt/python", "-r", "/app/requirements.txt"]
          volumeMounts:
            - name: application
              mountPath: /app
              readOnly: true
            - name: python-dependencies
              mountPath: /opt/python
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
      containers:
        - name: app
          image: python:3.12-slim
          env:
            - name: VAULT_ADDR
              value: http://vault.vault.svc:8200
            - name: PYTHONPATH
              value: /opt/python
          command: ["python", "/app/app.py"]
          volumeMounts:
            - name: application
              mountPath: /app
              readOnly: true
            - name: python-dependencies
              mountPath: /opt/python
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
      volumes:
        - name: application
          configMap:
            name: client-python-sdk
        - name: python-dependencies
          emptyDir: {}
